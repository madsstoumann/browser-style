<!DOCTYPE html>
<html lang="en-US" dir="ltr">
<head>
	<title>Modern Times</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<style>


modern-times {
	
	--mt-bg: hsl(12, 63%, 28%);
	--mt-bezel: #efd092;
	--mt-dial: hsl(192, 63%, 28%);
	
	--mt-minute: #a78d53;
	--mt-hour: #a78d53;

	aspect-ratio: 1;
	background:
		radial-gradient(circle closest-side,
			var(--mt-dial) 80%,
			#0000 81%
		),
		radial-gradient(circle closest-side,
			#0000 80%,
			var(--mt-bezel) 81% 90%,
			#0000 91%
		),
		var(--mt-bg);

	box-sizing: border-box;
	container-type: inline-size;
	display: grid;
	width: 100%;

	&::before {
		aspect-ratio: 1;
		/* animation: dot 60s steps(60) infinite; */
		background: var(--mt-hour);
		border-radius: 50%;
		content: "";
		grid-area: 1 / -1;
		offset-distance: var(--_od, 0%);
		offset-path: circle(30% at center);
		width: 7.5%;
	}
	&::after {

		--_w: 70%;
		--_h: 1em;
		background: var(--mt-minute);
		border-radius: 1em;
		content: "";
		display: block;
		grid-area: 1 / -1;
		height: var(--_h);
		mask:
			radial-gradient(circle at center, #0000 0.25em, #000 0.25em),
			radial-gradient(circle calc(var(--_h) / 2) at 50% center, #000 100%, #0000 100%),
			linear-gradient(to right, #0000 50%, #000 50%);
		mask-composite: intersect, add;
		place-self: center center;
		rotate: 45deg;
		width: var(--_w);
	}
}

@keyframes dot { to { offset-distance: 100%; } }

body {
	max-width: 400px;
	margin: 2rem auto;	
}

	
	</style>
</head>
<body>

	<modern-times></modern-times>

</body>
</html>
