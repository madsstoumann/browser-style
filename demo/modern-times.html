<!DOCTYPE html>
<html lang="en-US" dir="ltr">
<head>
	<title>Modern Times</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<style>


modern-times {
	
	--mt-dial: attr(dial type(<color>), hsl(192, 63%, 28%));
	--mt-bg: hsl(from var(--mt-dial) calc(h + 180) s l);
	--mt-bezel: #efd092;
	--mt-gap: 10%;
	--bezel-w: 10%;

	--mt-minute: #a78d53;
	--mt-hour: #a78d53;

	--_hour: attr(hour type(<number>), 0);
	--_minute: attr(minute type(<number>), 0);

	--_bezel-outer: calc(100% - var(--mt-gap));
	--_bezel-inner: calc(100% - var(--mt-gap) - var(--bezel-w));

	aspect-ratio: 1;
	background:
		radial-gradient(circle closest-side,
			var(--mt-dial) var(--_bezel-inner),
			#0000 calc(var(--_bezel-inner) + 1%)
		),
		radial-gradient(circle closest-side,
			#0000 var(--_bezel-inner),
			var(--mt-bezel) calc(var(--_bezel-inner) + 1%) var(--_bezel-outer),
			#0000 calc(var(--_bezel-outer) + 1%)
		),
		var(--mt-bg);

		box-sizing: border-box;
		container-type: inline-size;
		display: grid;
		width: 100%;

	&::before {
		--_w: calc(var(--_bezel-inner) * 0.65);
		--_h: 5cqi;
		animation-delay: calc((var(--_hour) * -3600s) + (var(--_minute) * -60s) - 32400s);
		animation-duration: 43200s;
		background: var(--mt-hour);
	}

	&::after {
		--_w: calc(var(--_bezel-inner) * 0.9);
		--_h: 5cqi;
		animation-delay: calc((var(--_minute) * -60s) - 2700s);
		animation-duration: 3600s;
		background: var(--mt-minute);
	}

	&::after, &::before {
		animation-name: turn;
		animation-iteration-count: infinite;
		animation-timing-function: linear;
		border-radius: var(--_h);
		content: "";
		display: block;
		grid-area: 1 / -1;
		height: var(--_h);
		mask:
			radial-gradient(circle at center, #0000 calc(var(--_h) / 4), #000 calc(var(--_h) / 4)),
			radial-gradient(circle calc(var(--_h) / 2) at 50% center, #000 100%, #0000 100%),
			linear-gradient(to right, #0000 50%, #000 50%);
		mask-composite: intersect, add;
		place-self: center center;
		width: var(--_w);
	}

	&[mode=picto]::before {
		--_w: 7.5%;
		--_h: 7.5%;
		/* animation: dot 60s steps(60) infinite; */
		border-radius: 50%;
		offset-distance: var(--_d, 0%);
		offset-path: circle(30% at center);
		place-self: center end;
	}
}

@keyframes turn { to { rotate: 1turn; } }
@keyframes dot { to { offset-distance: 100%; } }

body {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
	margin: 0;
}

	
	</style>
</head>
<body>

	<modern-times hour="0" minute="0" dial="#741a1a"></modern-times>
	<modern-times hour="0" minute="30" dial="#743a1a"></modern-times>
	<modern-times hour="1" minute="0" dial="#745a1a"></modern-times>
	<modern-times hour="1" minute="30" dial="#74741a"></modern-times>
	<modern-times hour="2" minute="0" dial="#5a741a"></modern-times>
	<modern-times hour="2" minute="30" dial="#3a741a"></modern-times>
	<modern-times hour="3" minute="0" dial="#1a741a"></modern-times>
	<modern-times hour="3" minute="30" dial="#1a743a"></modern-times>
	<modern-times hour="4" minute="0" dial="#1a745a"></modern-times>
	<modern-times hour="4" minute="30" dial="#1a7474"></modern-times>
	<modern-times hour="5" minute="0" dial="#1a5a74"></modern-times>
	<modern-times hour="5" minute="30" dial="#1a3a74"></modern-times>
	<modern-times hour="6" minute="0" dial="#1a1a74"></modern-times>
	<modern-times hour="6" minute="30" dial="#3a1a74"></modern-times>
	<modern-times hour="7" minute="0" dial="#5a1a74"></modern-times>
	<modern-times hour="7" minute="30" dial="#741a74"></modern-times>
	<modern-times hour="8" minute="0" dial="#741a5a"></modern-times>
	<modern-times hour="8" minute="30" dial="#741a3a"></modern-times>
	<modern-times hour="9" minute="0" dial="#8b1a1a"></modern-times>
	<modern-times hour="9" minute="30" dial="#8b4a1a"></modern-times>
	<modern-times hour="10" minute="0" dial="#1a6b5a"></modern-times>
	<modern-times hour="10" minute="30" dial="#4a1a6b"></modern-times>
	<modern-times hour="11" minute="0" dial="#6b1a4a"></modern-times>
	<modern-times hour="11" minute="30" dial="#1a4a6b"></modern-times>

</body>
</html>
