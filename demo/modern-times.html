<!DOCTYPE html>
<html lang="en-US" dir="ltr">
<head>
  <title>Modern Times</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>

@property --_a {
  syntax: "<angle>";
  initial-value: 0turn;
  inherits: false;
}

modern-times {
  --mt-arms: attr(arms type(<color>), var(--mt-bezel));
  --mt-bezel-w: 12%;
  --mt-bezel: attr(bezel type(<color>), Canvastext);
  --mt-bg: attr(bg type(<color>), hsl(from var(--mt-dial) calc(h + 180) s l));
  --mt-dial: attr(dial type(<color>), Canvas);
  --mt-dot: attr(dot type(<color>), var(--mt-dial));
  --mt-gap: 10%;
  --mt-hole: calc(var(--mt-bezel-w) / 5);
  --mt-hour: hsl(from var(--mt-arms) h s l / 0.5);
  --mt-minute: var(--mt-arms);

  --_hour: attr(hour type(<number>), 0);
  --_minute: attr(minute type(<number>), 0);
  --_second: attr(second type(<number>), 0);

  --_bezel-outer: calc(100% - var(--mt-gap));
  --_bezel-inner: calc(100% - var(--mt-gap) - var(--mt-bezel-w));
  --_r: calc((var(--_bezel-outer) + var(--_bezel-inner)) / 4);

  animation: bg-turn 60s steps(60) infinite;
  animation-delay: calc(var(--_second) * -1s);
  aspect-ratio: 1;
  background:
    radial-gradient(circle closest-side,
      var(--mt-dial) var(--_bezel-inner),
      #0000 calc(var(--_bezel-inner) + 1%)
    ),
    radial-gradient(circle at calc(50% + sin(var(--_a)) * var(--_r)) calc(50% - cos(var(--_a)) * var(--_r)),
      var(--mt-dot) calc(var(--mt-hole) / 2),
      #0000 calc(var(--mt-hole) / 2 + 0.5%)
    ),
    radial-gradient(circle closest-side,
      #0000 var(--_bezel-inner),
      var(--mt-bezel) calc(var(--_bezel-inner) + 1%) var(--_bezel-outer),
      #0000 calc(var(--_bezel-outer) + 1%)
    ),
    var(--mt-bg);

  box-sizing: border-box;
  color: hsl(from var(--mt-bezel) h s l / 0.5);
  color-scheme: light dark;
  container-type: inline-size;
  display: grid;
  font-family: ui-sans-serif, system-ui;
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.125em;
  padding-block-start: 60%;
  place-items: start center;
  position: relative;
  text-transform: uppercase;
  width: 100%;

  &::before {
    --_w: calc(var(--_bezel-inner) * 0.65);
    --_h: 6cqi;
    animation-delay: calc((var(--_hour) * -3600s) + (var(--_minute) * -60s) - 32400s);
    animation-duration: 43200s;
    animation-timing-function: linear;
    background: var(--mt-hour);
  }

  &::after {
    --_w: calc(var(--_bezel-inner) * 0.9);
    --_h: 6cqi;
    animation-delay: calc((var(--_minute) * -60s) - 2700s);
    animation-duration: 3600s;
    animation-timing-function: steps(60);
    background: var(--mt-minute);
  }

  &::after, &::before {
    animation-name: turn;
    animation-iteration-count: infinite;
    border-radius: var(--_h);
    content: "";
    height: var(--_h);
    inset: 0;
    margin: auto;
    mask:
      radial-gradient(circle at center, #0000 calc(var(--_h) / 4), #000 calc(var(--_h) / 4)),
      radial-gradient(circle calc(var(--_h) / 2) at 50% center, #000 100%, #0000 100%),
      linear-gradient(to right, #0000 50%, #000 50%);
    mask-composite: intersect, add;
    position: absolute;
    width: var(--_w);
  }

  &[mode=picto]::before {
    --_w: 7.5%;
    --_h: 7.5%;
    background: var(--mt-arms);
    border-radius: 50%;
    offset-distance: var(--_d, 0%);
    offset-path: circle(30% at center);
    place-self: center end;
  }
}

@keyframes bg-turn { to { --_a: 1turn; } }
@keyframes dot { to { offset-distance: 100%; } }
@keyframes turn { to { rotate: 1turn; } }

body {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  margin: 0;
}

  </style>
</head>
