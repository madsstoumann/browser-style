<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Web Config Alt - Contentful App</title>
	<script src="https://unpkg.com/contentful-ui-extensions-sdk@4"></script>
	<script type="importmap">
		{
			"imports": {
				"@browser.style/web-config-shared": "https://browser.style/ui/web-config-shared/index.js"
			}
		}
	</script>
	<style>
		body { margin: 0; padding: 16px; min-height: 100px; }
		#app { min-height: 60px; }
	</style>
</head>
<body>
	<div id="app"></div>

	<script type="module">
		import 'https://browser.style/ui/web-config-alt/src/index.js';

		const mount = async (api) => {
			const app = document.getElementById('app');

			await customElements.whenDefined('web-config-alt');

			const editor = document.createElement('web-config-alt');

			// Installation params: workerUrl, apiKey (shared across all fields)
			const installParams = api?.parameters?.installation || {};
			const workerUrl = installParams.workerUrl || '';
			const apiKey = installParams.apiKey || '';

			// Instance params: detail level (per field)
			const instanceParams = api?.parameters?.instance || {};
			const detail = instanceParams.detail || 'standard';
			editor.detail = detail;

			if (api) {
				// Load existing value
				const currentValue = api.field.getValue();
				if (typeof currentValue === 'string' && currentValue.trim()) {
					editor.value = currentValue;
				}

				// Resolve image URL from a sibling media field
				const fields = api.entry?.fields;
				if (fields?.file) {
					const locale = api.field.locale || 'en-US';
					const fileValue = fields.file.getValue(locale);
					if (fileValue?.url) {
						editor.src = fileValue.url.startsWith('//') ? `https:${fileValue.url}` : fileValue.url;
					}
				}

				// Handle alt text generation
				editor.addEventListener('requestGenerate', async (event) => {
					const src = editor.src;
					if (!workerUrl || !src) {
						editor.showError('Worker URL and image source are required.');
						editor.generating = false;
						return;
					}

					try {
						const endpoint = workerUrl.replace(/\/+$/, '') + '/analyze';
						const response = await fetch(endpoint, {
							method: 'POST',
							headers: {
								'Content-Type': 'application/json',
								...(apiKey && { 'X-API-Key': apiKey })
							},
							body: JSON.stringify({
								url: src,
								detail: event.detail?.detail || detail
							})
						});

						if (!response.ok) {
							throw new Error(`HTTP ${response.status}: ${await response.text()}`);
						}

						const data = await response.json();

						if (data.error) {
							editor.showError(data.error);
						} else {
							editor.value = data.alt || data.text || data.result || '';
							api.field.setValue(editor.value);
						}
					} catch (err) {
						editor.showError(err.message);
					} finally {
						editor.generating = false;
					}
				});

				// Save on manual edits
				editor.addEventListener('change', (event) => {
					const { alt } = event.detail || {};
					api.field.setValue(typeof alt === 'string' ? alt : null);
				});

				api.window.startAutoResizer();
			}

			app.appendChild(editor);
		};

		if (window.contentfulExtension) {
			try {
				const initResult = window.contentfulExtension.init(async (api) => mount(api));
				if (initResult && typeof initResult.catch === 'function') {
					initResult.catch((error) => console.error('Contentful SDK error:', error));
				}
			} catch (error) {
				console.error('Failed to initialize Contentful SDK:', error);
			}
		} else {
			mount(null);
		}
	</script>
</body>
</html>
