<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Config Color - Storyblok Field Plugin</title>
  <script src="https://unpkg.com/@storyblok/field-plugin@1/dist/index.js"></script>
  <script type="importmap">
    {
      "imports": {
        "@browser.style/web-config-shared": "https://browser.style/ui/web-config-shared/index.js"
      }
    }
  </script>
  <style>
    body { margin: 0; padding: 16px; min-height: 100px; }
    #app { min-height: 100px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import 'https://browser.style/ui/web-config-color/src/index.js';

    const mount = async (plugin) => {
      const app = document.getElementById('app');

      await customElements.whenDefined('web-config-color');

      const editor = document.createElement('web-config-color');

      // Read presets from plugin options (set by UCM adapter during sync)
      const options = plugin?.options;
      const presets = options?.presets;
      if (presets) {
        editor.presets = typeof presets === 'string' ? JSON.parse(presets) : presets;
      }

      app.appendChild(editor);

      if (plugin) {
        const currentValue = plugin.data?.content;
        if (currentValue) editor.value = currentValue;

        editor.addEventListener('color-change', (e) => {
          plugin.setContent(e.detail.label);
        });
      }
    };

    if (window.StoryblokFieldPlugin) {
      try {
        window.StoryblokFieldPlugin.init((plugin) => mount(plugin));
      } catch (error) {
        console.error('Storyblok plugin error:', error);
      }
    } else {
      mount(null);
    }
  </script>
</body>
</html>
