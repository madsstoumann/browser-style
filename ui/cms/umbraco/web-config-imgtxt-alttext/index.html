<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Accessible Image - Umbraco Property Editor</title>
	<script type="importmap">
		{
			"imports": {
				"@browser.style/web-config-shared": "https://browser.style/ui/web-config-shared/index.js"
			}
		}
	</script>
	<style>
		* { box-sizing: border-box; }
		body {
			margin: 0;
			padding: 12px;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background: transparent;
		}
		#app { min-height: 60px; }
	</style>
</head>
<body>
	<div id="app"></div>

	<script type="module">
		import 'https://browser.style/ui/web-config-imgtxt/src/index.js';

		const app = document.getElementById('app');
		let editor = null;
		let umbracoOrigin = null;

		const sendToUmbraco = (type, data = {}) => {
			window.parent.postMessage({ type, ...data }, umbracoOrigin || '*');
		};

		const updateHeight = () => {
			const height = document.body.scrollHeight;
			sendToUmbraco('resize', { height });
		};

		const initComponent = async (config) => {
			await customElements.whenDefined('web-config-imgtxt');

			editor = document.createElement('web-config-imgtxt');
			editor.setAttribute('preset', 'alttext');

			if (config?.src) editor.src = config.src;

			app.appendChild(editor);

			// Set values after append
			await new Promise(r => requestAnimationFrame(r));
			if (config?.value || config?.longdesc) {
				editor.result = {
					alt: config.value || '',
					longdesc: config.longdesc || ''
				};
			}

			editor.addEventListener('change', (event) => {
				const { alt, longdesc } = event.detail || {};
				sendToUmbraco('valueChanged', { alt: alt ?? '', longdesc: longdesc ?? '' });
				requestAnimationFrame(updateHeight);
			});

			editor.addEventListener('requestGenerate', () => {
				sendToUmbraco('requestGenerate');
			});

			sendToUmbraco('ready');
			requestAnimationFrame(updateHeight);

			const resizeObserver = new ResizeObserver(() => {
				requestAnimationFrame(updateHeight);
			});
			resizeObserver.observe(app);
		};

		window.addEventListener('message', async (event) => {
			const { type, value, longdesc, origin: senderOrigin, src } = event.data || {};

			// Before init: only accept the init message
			if (!umbracoOrigin) {
				if (type !== 'init') return;
				if (senderOrigin) umbracoOrigin = senderOrigin;
				await initComponent(event.data);
				return;
			}

			// After init: strict origin check
			if (event.origin !== umbracoOrigin) return;

			switch (type) {

				case 'setValue':
					if (editor) {
						editor.result = {
							alt: value ?? '',
							longdesc: longdesc ?? (editor.result?.longdesc || '')
						};
					}
					break;

				case 'setSrc':
					if (editor && src !== undefined) {
						editor.src = src;
					}
					break;

				case 'generateResult':
					if (editor) {
						const { alt, longdesc: ld, error } = event.data;
						if (error) {
							editor.showError(error);
						} else {
							editor.result = { alt: alt || '', longdesc: ld || '' };
							sendToUmbraco('valueChanged', { alt: alt || '', longdesc: ld || '' });
						}
						editor.generating = false;
						requestAnimationFrame(updateHeight);
					}
					break;

				case 'getState':
					if (editor) {
						const result = editor.result || {};
						sendToUmbraco('state', { alt: result.alt || '', longdesc: result.longdesc || '' });
					}
					break;
			}
		});

		if (window === window.parent) {
			console.log('Running in standalone mode');
			initComponent(null);
		} else {
			sendToUmbraco('loaded');
		}
	</script>
</body>
</html>
