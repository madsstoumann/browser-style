<!DOCTYPE html>
<html lang="en-US" dir="ltr">
<head>
	<title>Web Config CORS</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<meta name="description" content="Web Config CORS - Visual editor for CORS headers">
	<meta name="view-transition" content="same-origin">
	<link rel="stylesheet" href="/ui/base/index.css">
	<script type="importmap">
		{
			"imports": {
				"@browser.style/web-config-shared": "../web-config-shared/index.js"
			}
		}
	</script>
</head>
<body>
	<h1>Web Config: CORS</h1>
	<web-config-cors value='{"allowed_origins":["https://app.example.com"],"allowed_methods":["GET","POST","OPTIONS"],"allowed_headers":["Content-Type","Authorization"],"expose_headers":[],"max_age":86400,"allow_credentials":true}'></web-config-cors>
	<script type="module" src="./src/index.js"></script>
</body>
</html>
