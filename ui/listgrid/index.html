<!DOCTYPE html>
<html lang="en-US" dir="ltr">
<head>
	<title>List Grid</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<meta name="description" content="HTML is the foundation of the World Wide Web, and it is still the most popular markup language in use today.">
	<meta name="view-transition" content="same-origin">
	<link rel="stylesheet" href="/ui/base/index.css">
	<link rel="stylesheet" href="/ui/rating/ui-rating.css">
	<link rel="stylesheet" href="ui-listgrid.css">
</head>
<body>
	<h1>UI: Components</h1>

	<h2>List Grid</h2>
	<p>
		
	</p>

	<ul class="ui-listgrid">
		<li>
			<small>Prep time</small>
			<strong>10 mins</strong>
		</li>
		<li>
			<small>Cook time</small>
			<strong>20 mins</strong>
		</li>
		<li>
			<small>Total time</small>
			<strong>30 mins</strong>
		</li>
		<li>
			<small>Servings</small>
			<strong>4</strong>
		</li>
		<li>
			<small>Difficulty</small>
			<input type="range" disabled min="1" max="5" step="1" value="3" class="ui-rating --dots">
		</li>
		<li>
			<small>Spice level</small>
			<input type="range" disabled min="1" max="5" step="1" value="1" class="ui-rating --dots">
		</li>
		<li>
			<small>Cost</small>
			<strong>$$</strong>
		</li>
	</ul>
</body>
</html>
