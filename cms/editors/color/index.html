<!DOCTYPE html>
<html lang="en-US" dir="ltr">
<head>
	<title>Editor Color</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<meta name="description" content="Editor Color - Color palette picker for CMS integration">
	<meta name="view-transition" content="same-origin">
	<link rel="stylesheet" href="/ui/base/index.css">
	<script type="importmap">
		{
			"imports": {
				"@browser.style/editor-shared": "../shared/index.js"
			}
		}
	</script>
</head>
<body>
	<h1>Editor: Color</h1>
	<p>A color palette picker for CMS integration. Select from predefined brand colors. The stored value is the <strong>label</strong> (CSS class name), not the hex.</p>

	<editor-color id="editor" label="Brand Color"></editor-color>

	<fieldset style="margin-block-start:2ch;">
		<legend>Output</legend>
		<label>
			Selected value
			<input type="text" id="output" readonly placeholder="(none)">
		</label>
	</fieldset>

	<script type="module">
		import './src/index.js';

		const editor = document.getElementById('editor');
		const output = document.getElementById('output');

		editor.presets = [
			{ value: "#ecaba4", label: "bg-coral" },
			{ value: "#583459", label: "bg-purple" },
			{ value: "#09bc8a", label: "bg-green" },
			{ value: "#fbfeb5", label: "bg-yellow" },
			{ value: "#1d57f3", label: "bg-blue" },
			{ value: "#111316", label: "bg-black" },
			{ value: "#ffffff", label: "bg-white" },
			{ value: "#dfdcd3", label: "bg-gray" },
			{ value: "#f4f3f0", label: "bg-gray-light" },
			{ value: "#b09293", label: "bg-pink" }
		];

		// Pre-select a value
		editor.value = "bg-blue";

		editor.addEventListener('color-change', (e) => {
			console.log('Color changed:', e.detail);
			output.value = `${e.detail.label} (${e.detail.value})`;
		});
	</script>
</body>
</html>
