<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Config Color - Contentful App</title>
  <script src="https://unpkg.com/contentful-ui-extensions-sdk@4"></script>
  <script type="importmap">
    {
      "imports": {
        "@browser.style/editor-shared": "https://browser.style/cms/editors/shared/index.js"
      }
    }
  </script>
  <style>
    body { margin: 0; padding: 16px; min-height: 100px; }
    #app { min-height: 100px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import 'https://browser.style/cms/editors/color/src/index.js';

    const mount = async (api) => {
      const app = document.getElementById('app');

      await customElements.whenDefined('editor-color');

      const editor = document.createElement('editor-color');

      // Read presets from instance parameters (set by UCM adapter during sync)
      const presets = api?.parameters?.instance?.presets;
      if (presets) {
        editor.presets = typeof presets === 'string' ? JSON.parse(presets) : presets;
      }

      app.appendChild(editor);

      if (api) {
        const currentValue = api.field.getValue();
        if (currentValue) editor.value = currentValue;

        editor.addEventListener('color-change', (e) => {
          api.field.setValue(e.detail.label);
        });

        api.window.startAutoResizer();
      }
    };

    if (window.contentfulExtension) {
      try {
        const initResult = window.contentfulExtension.init(async (api) => mount(api));
        if (initResult && typeof initResult.catch === 'function') {
          initResult.catch((error) => console.error('Contentful SDK error:', error));
        }
      } catch (error) {
        console.error('Failed to initialize Contentful SDK:', error);
      }
    } else {
      mount(null);
    }
  </script>
</body>
</html>
